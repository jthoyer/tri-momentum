  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ce 4 — pressed state    */\n\n  /* ── Ink / text ──────────────────────────── */\n  --ink:  #0E1020;  /* Primary text                 */\n  --ink2: #4B5278;  /* Secondary text               */\n  --ink3: #8B93B8;  /* Tertiary / placeholder       */\n\n  /* ── Borders ─────────────────────────────── */\n  --bd:  rgba(14,16,32,0.08);   /* Default          */\n  --bd2: rgba(14,16,32,0.14);   /* Emphasized       */\n  --bd3: rgba(14,16,32,0.25);   /* Strong / focused */\n\n  /* ── Sport disciplines ───────────────────── */\n  --blue:     #1650C8;  --blue-l:     #E8EFFE;\n  --swim:     #1650C8;  --swim-l:     #E8EFFE;\n  --bike:     #0F6E56;  --bike-l:     #E1F5EE;\n  --run:      #993C1D;  --run-l:      #FAECE7;\n  --brick:    #534AB7;  --brick-l:    #EEEDFE;\n  --strength: #854F0B;  --strength-l: #FAEEDA;\n  --rest:     #8B93B8;  --rest-l:     #F0F2F8;\n  --race:     #72243E;  --race-l:     #FBEAF0;\n\n  /* ── Panel actors ────────────────────────── */\n  --coach:  #1650C8;  --coach-bg:  #E8EFFE;  --coach-bd:  #B5D4F4;\n  --nutri:  #0F6E56;  --nutri-bg:  #E1F5EE;  --nutri-bd:  #9FE1CB;\n  --psych:  #534AB7;  --psych-bg:  #EEEDFE;  --psych-bd:  #CECBF6;\n  --physio: #993C1D;  --physio-bg: #FAECE7;  --physio-bd: #F5C4B3;\n  --strat:  #854F0B;  --strat-bg:  #FAEEDA;  --strat-bd:  #FAC775;\n  --panel:  #72243E;  --panel-bg:  #FBEAF0;  --panel-bd:  #EDB2C7;\n\n  /* ── Status ──────────────────────────────── */\n  --done:     #0F6E56;  --done-l:     #E1F5EE;\n  --skipped:  #993C1D;  --skipped-l:  #FAECE7;\n  --modified: #854F0B;  --modified-l: #FAEEDA;\n}\n\n[data-theme=\"dark\"] {\n  --bg:  #0C0D10;\n  --s1:  #13141A;\n  --s2:  #1A1B24;\n  --s3:  #22242F;\n  --s4:  #2A2C38;\n\n  --ink:  #F0EEE8;\n  --ink2: #9B9BAA;\n  --ink3: #5A5A6E;\n\n  --bd:  rgba(255,255,255,0.06);\n  --bd2: rgba(255,255,255,0.10);\n  --bd3: rgba(255,255,255,0.18);\n\n  --blue:     #4A9EFF;  --blue-l:     rgba(74,158,255,0.12);\n  --swim:     #4A9EFF;  --swim-l:     rgba(74,158,255,0.12);\n  --bike:     #3EC98E;  --bike-l:     rgba(62,201,142,0.12);\n  --run:      #F97316;  --run-l:      rgba(249,115,22,0.12);\n  --brick:    #C084FC;  --brick-l:    rgba(192,132,252,0.12);\n  --strength: #F59E0B;  --strength-l: rgba(245,158,11,0.12);\n  --rest:     #5A5A6E;  --rest-l:     #22242F;\n  --race:     #E84393;  --race-l:     rgba(232,67,147,0.12);\n\n  --coach:  #4A9EFF;  --coach-bg:  rgba(74,158,255,0.10);   --coach-bd:  rgba(74,158,255,0.28);\n  --nutri:  #3EC98E;  --nutri-bg:  rgba(62,201,142,0.10);   --nutri-bd:  rgba(62,201,142,0.28);\n  --psych:  #C084FC;  --psych-bg:  rgba(192,132,252,0.10);  --psych-bd:  rgba(192,132,252,0.28);\n  --physio: #F97316;  --physio-bg: rgba(249,115,22,0.10);   --physio-bd: rgba(249,115,22,0.28);\n  --strat:  #F59E0B;  --strat-bg:  rgba(245,158,11,0.10);   --strat-bd:  rgba(245,158,11,0.28);\n  --panel:  #E84393;  --panel-bg:  rgba(232,67,147,0.10);   --panel-bd:  rgba(232,67,147,0.28);\n\n  --done:     #3EC98E;  --done-l:     rgba(62,201,142,0.14);\n  --skipped:  #F97316;  --skipped-l:  rgba(249,115,22,0.14);\n  --modified: #F59E0B;  --modified-l: rgba(245,158,11,0.14);\n}\n\n/* TRI Momentum — Spacing & radius tokens */\n\n:root {\n  /* ── Border radii ────────────────────────── */\n  --rmd:  10px;   /* Buttons, inputs, small cards  */\n  --rlg:  16px;   /* Cards, panels                 */\n  --rxl:  22px;   /* Hero card, device frame       */\n\n  /* ── Layout ──────────────────────────────── */\n  --nav-h: 66px;  /* Bottom navigation height      */\n\n  /* ── Spacing scale (4px base) ────────────── */\n  --sp-1:   4px;\n  --sp-2:   8px;\n  --sp-3:  12px;\n  --sp-4:  16px;\n  --sp-5:  20px;\n  --sp-6:  24px;\n  --sp-8:  32px;\n  --sp-10: 40px;\n}\n\n\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}\n\nbody{\n  font-family:var(--fb);\n  background:var(--bg);\n  color:var(--ink);\n  min-height:100vh;\n  padding:52px 24px 96px;\n  -webkit-font-smoothing:antialiased;\n  line-height:1.5;\n}\n\n.wrap{max-width:860px;margin:0 auto}\n\n/* Back link */\n.back{\n  display:inline-flex;align-items:center;gap:6px;\n  font-family:var(--fm);font-size:10px;letter-spacing:.1em;text-transform:uppercase;\n  color:var(--ink3);text-decoration:none;margin-bottom:40px;transition:color .15s;\n}\n.back:hover{color:var(--ink)}\n\n/* Page header */\n.page-hdr{margin-bottom:48px}\n.eyebrow{font-family:var(--fm);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}\n.page-title{font-size:28px;font-weight:600;letter-spacing:-.4px;line-height:1.1;color:var(--ink)}\n.page-sub{font-size:14px;color:var(--ink2);margin-top:8px;line-height:1.6;max-width:560px}\n\n/* Sections */\n.section{margin-bottom:52px}\n.sec-head{\n  font-family:var(--fm);font-size:9px;letter-spacing:.12em;text-transform:uppercase;\n  color:var(--ink3);padding-bottom:10px;border-bottom:1px solid var(--bd);\n  margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;\n}\n\n/* Swatch rows */\n.sw-list{display:flex;flex-direction:column}\n.sw-row{display:flex;align-items:center;gap:16px;padding:12px 0;border-bottom:.5px solid var(--bd)}\n.sw-row:last-child{border-bottom:none}\n.sw{width:44px;height:44px;border-radius:9px;flex-shrink:0;border:1px solid rgba(14,16,32,.07)}\n.sw-sm{width:44px;height:44px;border-radius:9px;flex-shrink:0;border:1px solid rgba(14,16,32,.05)}\n.sw-pair{display:flex;gap:6px;flex-shrink:0}\n.sw-info{display:flex;flex-direction:column;gap:3px;min-width:0}\n.sw-name{font-family:var(--fm);font-size:11px;color:var(--ink);letter-spacing:.04em}\n.sw-token{font-family:var(--fm);font-size:10px;color:var(--ink3)}\n.sw-desc{font-size:12px;color:var(--ink2);margin-top:1px}\n\n/* Token rows (generic) */\n.t-list{display:flex;flex-direction:column}\n.t-row{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:.5px solid var(--bd)}\n.t-row:last-child{border-bottom:none}\n.t-swatch{width:36px;height:36px;border-radius:8px;flex-shrink:0;border:1px solid rgba(14,16,32,.08)}\n.t-name{font-family:var(--fm);font-size:11px;color:var(--ink);min-width:130px}\n.t-val{font-family:var(--fm);font-size:10px;color:var(--ink3);min-width:90px}\n.t-desc{font-size:13px;color:var(--ink2);line-height:1.4}\n\n/* Dark mode toggle */\n.dm-btn{\n  position:fixed;top:18px;right:18px;\n  font-family:var(--fm);font-size:9px;letter-spacing:.1em;text-transform:uppercase;\n  color:var(--ink3);background:var(--s1);border:1px solid var(--bd2);\n  padding:7px 14px;border-radius:20px;cursor:pointer;transition:all .15s;z-index:100;\n}\n.dm-btn:hover{color:var(--ink);border-color:var(--bd3)}\n<\u002Fstyle>\n<style>\n/* Hub-specific overrides */\nbody{padding:52px 24px 96px}\n\n.hub-header{margin-bottom:60px}\n.hub-wordmark{display:flex;align-items:center;gap:10px;margin-bottom:28px}\n.hub-tri{display:flex;gap:3px}\n.hub-letter{width:22px;height:22px;border-radius:4px;background:var(--ink);color:var(--bg);display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:10px;font-weight:500}\n.hub-brand{font-family:var(--fd);font-size:16px;font-weight:600;letter-spacing:-.02em}\n.hub-title{font-size:32px;font-weight:600;letter-spacing:-.5px;line-height:1.1;margin-bottom:10px}\n.hub-meta{font-family:var(--fm);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3)}\n.hub-sub{font-size:14px;color:var(--ink2);margin-top:12px;line-height:1.7;max-width:520px}\n\n/* Section groups */\n.ds-group{margin-bottom:52px}\n.ds-group-label{font-family:var(--fm);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);padding-bottom:10px;border-bottom:1px solid var(--bd);margin-bottom:16px}\n.ds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}\n.ds-card{display:flex;flex-direction:column;gap:10px;background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:16px;text-decoration:none;color:inherit;transition:border-color .15s,box-shadow .15s}\n.ds-card:hover{border-color:var(--bd3)}\n.ds-card-preview{height:60px;border-radius:8px;background:var(--s3);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}\n.ds-card-label{font-family:var(--fm);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3)}\n.ds-card-title{font-size:14px;font-weight:600;color:var(--ink);margin-top:2px}\n.ds-card-desc{font-size:12px;color:var(--ink2);line-height:1.5;margin-top:2px}\n.ds-arrow{font-family:var(--fm);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);margin-top:auto;padding-top:8px}\n\n/* Sport swatch strip preview */\n.preview-swatches{display:flex;gap:4px;padding:0 12px}\n.preview-sw{width:24px;height:24px;border-radius:5px}\n\n/* Actor dots preview */\n.preview-actors{display:flex;gap:6px;padding:0 12px}\n.preview-dot{width:20px;height:20px;border-radius:50%}\n\n/* Surface nesting preview */\n.preview-surfaces{padding:6px;display:flex;align-items:center;justify-content:center;width:100%}\n.psrf{border-radius:6px;padding:5px;display:flex;align-items:center;justify-content:center;border:1px solid var(--bd);font-family:var(--fm);font-size:7px;color:var(--ink3)}\n\n/* Ink preview */\n.preview-ink{display:flex;flex-direction:column;gap:4px;padding:0 12px;justify-content:center}\n.preview-ink span{font-family:var(--fd);font-weight:600;font-size:18px;line-height:1}\n\n/* Type preview */\n.preview-type{display:flex;flex-direction:column;gap:4px;padding:0 12px;justify-content:center;overflow:hidden}\n\n/* Radii preview */\n.preview-radii{display:flex;gap:8px;padding:0 12px;align-items:center}\n.preview-r{width:32px;height:32px;background:var(--ink);opacity:.15}\n\n/* Spacing preview */\n.preview-spacing{display:flex;align-items:flex-end;gap:3px;padding:0 12px 8px}\n.preview-sp{background:var(--ink);opacity:.2;width:10px}\n\n/* Status preview */\n.preview-status{display:flex;gap:6px;padding:0 10px;align-items:center}\n.preview-badge{padding:3px 8px;border-radiu
